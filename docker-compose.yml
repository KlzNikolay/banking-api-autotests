services:
  db:
    image: postgres:16
    container_name: banking_api_db
    environment:
      POSTGRES_DB: banking
      POSTGRES_USER: qa_user
      POSTGRES_PASSWORD: qa_password
    ports:
      - "5432:5432"

  api:
    image: python:3.12
    container_name: banking_api_service
    working_dir: /app
    volumes:
      - .:/app
    command: bash -c "pip install -r requirements.txt && uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload"
    ports:
      - "8000:8000"
    depends_on:
      - db